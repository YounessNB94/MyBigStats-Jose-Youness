<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MyBigStats - MMA</title>
  <link rel="stylesheet" href="styles/main.css">
</head>
<body data-sport-slug="mma" data-sport-view="stats">
  <div id="notification-container" role="status" aria-live="polite"></div>

  <header class="site-header site-header--sport">
    <nav class="site-nav" aria-label="Navigation principale">
      <a href="index.html">Accueil</a>
      <a href="football.html">Football</a>
      <a href="basketball.html">Basketball</a>
      <a href="mma.html" aria-current="page">MMA</a>
    </nav>
  </header>

  <main class="sport-page sport-page--mma">
    <nav class="view-switcher" aria-label="Vues du sport">
      <a href="mma.html" class="view-link" data-view-link="stats" aria-current="page">Statistiques</a>
      <a href="mma-history.html" class="view-link" data-view-link="history">Historique</a>
      <a href="mma-athletes.html" class="view-link" data-view-link="athletes">Athlètes</a>
    </nav>

    <section id="sport-statistics" class="sport-section sport-section--statistics" data-view-section="stats" role="tabpanel"></section>

    <section id="athlete-statistics" class="sport-section sport-section--athlete-statistics" data-view-section="stats">
      <h2>Statistiques d'un athlète</h2>

      <label for="single-athlete">Athlète</label>
      <select id="single-athlete" name="single-athlete">
        <option value="">Sélectionnez un athlète</option>
      </select>

      <div id="single-athlete-result" aria-live="polite"></div>
    </section>

    <section id="athlete-comparator" class="sport-section sport-section--comparator" data-view-section="stats">
      <h2>Comparer deux athlètes</h2>

      <label for="first-athlete">Premier athlète</label>
      <select id="first-athlete" name="first-athlete">
        <option value="">Sélectionnez un athlète</option>
      </select>

      <label for="second-athlete">Deuxième athlète</label>
      <select id="second-athlete" name="second-athlete">
        <option value="">Sélectionnez un athlète</option>
      </select>

      <button id="compare-athletes" type="button">Comparer</button>
      <div id="comparison-result" aria-live="polite"></div>
    </section>
  </main>

  <footer class="site-footer">
    <p>MyBigStats - MMA</p>
  </footer>

  <script type="module" src="dist/pages/sport-interactions.page.js"></script>
</body>
</html>
